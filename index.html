<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bakkabnb — Kleppe Farm</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --card: #ffffff;
      --ink: #2c2a26;
      --accent: #5a7d4f;
      --muted: #7a756c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.6;
    }
    .card {
      background: var(--card);
      max-width: 640px;
      width: 100%;
      padding: 3rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 0.25rem 0.85rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .tagline {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a.btn {
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      padding: 0.7rem 1.4rem;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    a.btn.secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    a.btn:hover { transform: translateY(-2px); opacity: 0.92; }
    footer {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">In development</span>
    <h1>🏡 Bakkabnb</h1>
    <p class="tagline">Family coordination at the Kleppe farm.</p>
    <div class="links">
      <a class="btn" href="https://github.com/StoveLorentzenDigital/bakkabnb">View repository</a>
      <a class="btn secondary" href="https://github.com/StoveLorentzenDigital/bakkabnb/issues">Ideas &amp; issues</a>
    </div>
    <footer>Kleppe farm · built by the Lorentzen family</footer>
  </main>
</body>
</html>
